<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marksheet Table</title>
    <style>
        table {
            width: 60%;
            border-collapse: collapse;
            margin: 20px auto;
            text-align: center;
        }
        th, td {
            border: 1px solid #000;
            padding: 8px;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Subject</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="3">Alice</td>
                <td>Math</td>
                <td>85</td>
            </tr>
            <tr>
                <td>English</td>
                <td>90</td>
            </tr>
            <tr>
                <td>Science</td>
                <td>88</td>
            </tr>
            <tr>
                <td rowspan="3">Bob</td>
                <td>Math</td>
                <td>78</td>
            </tr>
            <tr>
                <td>English</td>
                <td>82</td>
            </tr>
            <tr>
                <td>Science</td>
                <td>80</td>
            </tr>
            <tr>
                <td rowspan="3">Charlie</td>
                <td>Math</td>
                <td>92</td>
            </tr>
            <tr>
                <td>English</td>
                <td>88</td>
            </tr>
            <tr>
                <td>Science</td>
                <td>95</td>
            </tr>
            <tr>
                <td rowspan="3">Diana</td>
                <td>Math</td>
                <td>75</td>
            </tr>
            <tr>
                <td>English</td>
                <td>78</td>
            </tr>
            <tr>
                <td>Science</td>
                <td>80</td>
            </tr>
            <tr>
                <td rowspan="3">Ethan</td>
                <td>Math</td>
                <td>89</td>
            </tr>
            <tr>
                <td>English</td>
                <td>85</td>
            </tr>
            <tr>
                <td>Science</td>
                <td>90</td>
            </tr>
            <tr>
                <td colspan="2">Total Marks</td>
                <td>1375</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
