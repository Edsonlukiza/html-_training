<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formatting inline and block quotes</title>
</head>
<body>
    <h1>html quotes</h1>
    <blockquote>
        <p>"website development have 2 sided-based sides, front-end and back-end"</p>
        <cite>- Prof Elias</cite>
    </blockquote>
    <p>Inline quote: <q>to create a website start with learning html basics, such as attributes, headings,paragraphs etc</q>-<cite>Prof Elias</cite></p>

</body>
</html>
