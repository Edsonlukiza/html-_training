<!DOCTYPE html>
<html>
    <head>html tables</head>
    <title>html tables simplify data reading</title>
    <body>
        <h1>car rent system tables</h1>
        <table border="3">
            <tr>
                <th>car name</th>
                <th>date of rent</th>
                <th>rent period</th>
                
            </tr>
            <tr>
                <td>macedes</td>
                <td> 5 january 2007</td>
                <td> 18 days</td>
                
            </tr>

            <tr>
                <td>vox</td>
                <td> 5 january 2007</td>
                <td> 10 days</td>
                
            </tr>

            <tr>
                <td>toyota wish</td>
                <td> 6 january 2007</td>
                <td> 1days</td>
                
                <tr>
                    <td>terios</td>
                    <td> 7 january 2007</td>
                    <td> 2 days</td>
                    
                </tr>
            </tr>
        </table>
    </body>
</html>
